<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RailOptix — Administrative Gateway Access</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #334155;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            text-align: center;
        }

        .login-card h2 {
            margin: 0 0 6px 0;
            color: #0F172A;
            font-size: 22px;
            font-weight: 700;
        }

        .login-card p {
            font-size: 13px;
            color: #64748B;
            margin-top: 0;
            margin-bottom: 28px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            font-weight: 700;
            font-size: 11px;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            padding: 12px 14px;
            font-size: 14px;
            border: 1.5px solid #E2E8F0;
            border-radius: 6px;
            outline: none;
            background-color: #F8FAFC;
            transition: all 0.2s ease;
        }

        input:focus {
            border-color: #3B82F6;
            background-color: white;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            font-weight: 700;
            background-color: #2563EB;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        .btn-login:hover {
            background-color: #1D4ED8;
        }

        .error-msg {
            color: #DC2626;
            background-color: #FEE2E2;
            border: 1px solid #FCA5A5;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Security Gateway</h2>
        <p>Authorized Operations Personnel Verification</p>
        
        <div id="errorBox" class="error-msg"></div>

        <div class="form-group">
            <label>User Identifier</label>
            <input type="text" id="username" placeholder="Enter Admin Username">
        </div>

        <div class="form-group">
            <label>Security Keyphrase</label>
            <input type="password" id="password" placeholder="Enter Security Password">
        </div>

        <button class="btn-login" onclick="executeAuthentication()">Authenticate Credentials</button>
    </div>

    <script>
        async function executeAuthentication() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('errorBox');

            errorBox.style.display = 'none';

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            
            const data = await res.json();

            if (data.success) {
                // Unlock successful -> direct them instantly into the developer console
                window.location.href = '/developer';
            } else {
                // Deny access and trigger visual alert box
                errorBox.innerText = data.message;
                errorBox.style.display = 'block';
            }
        }
        
        // Let users hit "Enter" to submit form smoothly
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') executeAuthentication();
        });
    </script>
</body>
</html>
